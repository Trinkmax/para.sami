<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>studiOS · Servicio no disponible</title>
<link rel="icon" href="studios-logo.png" />
<meta name="robots" content="noindex" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --ink: #0b0b0d;
    --muted: #6b6b73;
    --line: #e6e6ea;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body { height: 100%; }

  body {
    font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    color: var(--ink);
    background:
      radial-gradient(1200px 600px at 50% -10%, #ffffff 0%, #f6f6f8 55%, #eeeef1 100%);
    min-height: 100dvh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 24px;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }

  .card {
    width: 100%;
    max-width: 680px;
    text-align: center;
    animation: rise 0.9s cubic-bezier(0.16, 1, 0.3, 1) both;
  }

  .code {
    font-size: clamp(14px, 2.4vw, 16px);
    font-weight: 600;
    letter-spacing: 0.42em;
    text-transform: uppercase;
    color: var(--muted);
    padding-left: 0.42em;
  }

  .logo-wrap {
    margin: 26px auto 0;
    max-width: 460px;
  }

  .logo-wrap img {
    width: 100%;
    height: auto;
    display: block;
  }

  .logo-caption {
    display: block;
    margin-top: 6px;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.34em;
    text-transform: uppercase;
    color: #a0a0a8;
  }

  .four-oh-four {
    margin-top: 18px;
    font-size: clamp(64px, 18vw, 168px);
    font-weight: 700;
    line-height: 0.9;
    letter-spacing: -0.04em;
    color: var(--ink);
  }

  .divider {
    width: 56px;
    height: 2px;
    background: var(--ink);
    border-radius: 2px;
    margin: 34px auto 30px;
    opacity: 0.85;
  }

  .headline {
    font-size: clamp(20px, 4vw, 28px);
    font-weight: 600;
    letter-spacing: -0.01em;
  }

  .body {
    margin: 16px auto 0;
    max-width: 460px;
    font-size: clamp(15px, 2.4vw, 17px);
    line-height: 1.65;
    color: var(--muted);
  }

  .signature {
    margin-top: 44px;
    display: inline-flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }

  .signature .by {
    font-size: 12px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: #a0a0a8;
  }

  .signature .name {
    font-size: 18px;
    font-weight: 600;
    letter-spacing: 0.01em;
    color: var(--ink);
  }

  @keyframes rise {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @media (prefers-reduced-motion: reduce) {
    .card { animation: none; }
  }
</style>
</head>
<body>
  <main class="card">
    <p class="code">Error 404</p>

    <div class="logo-wrap">
      <img src="studios-logo.png" alt="studiOS" />
      <span class="logo-caption">Agencia creadora</span>
    </div>

    <div class="four-oh-four">404</div>

    <div class="divider"></div>

    <h1 class="headline">El sitio web no se encuentra disponible</h1>
    <p class="body">
      Este sitio web fue pausado / dado de baja y ya no se encuentra disponible.
      Pedimos disculpas por los inconvenientes ocasionados.
    </p>

    <div class="signature">
      <span class="by">Atentamente</span>
      <span class="name">Ignacio Baldovino</span>
    </div>
  </main>
</body>
</html>
