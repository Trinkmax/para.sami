<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#2a1140" />
<title>para Samira</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400;1,9..144,500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
/* =========================================================================
   PARA SAMIRA · un jardín que florece
   Hecho por Nacho. Todo el contenido editable está en el objeto CONFIG (abajo,
   en el <script>). Cambiá textos, apodos, videos y la canción ahí.
   ========================================================================= */

:root{
  /* --- cielo al atardecer (OKLCH) --- */
  --sky-1: oklch(0.19 0.08 316);
  --sky-2: oklch(0.33 0.13 340);
  --sky-3: oklch(0.50 0.16 352);
  --glow-warm: oklch(0.82 0.12 32);
  --glow-rosa: oklch(0.85 0.13 350);
  --accent:   oklch(0.83 0.17 350);
  --gold:     oklch(0.87 0.13 88);

  --ink:      oklch(0.98 0.015 350);
  --ink-soft: oklch(0.91 0.035 350);
  --ink-mute: oklch(0.83 0.045 350);

  --card-bg:  oklch(0.24 0.07 328 / 0.66);
  --card-brd: oklch(0.86 0.10 350 / 0.28);

  --display: "Fraunces", Georgia, "Times New Roman", serif;
  --body: "Inter", system-ui, -apple-system, "Segoe UI", sans-serif;

  /* easing: ease-out, sin rebote */
  --e-expo: cubic-bezier(0.16, 1, 0.3, 1);
  --e-quart: cubic-bezier(0.25, 1, 0.5, 1);
  --e-bloom: cubic-bezier(0.18, 0.86, 0.26, 1);

  --z-stage: 1;
  --z-vines: 2;
  --z-flowers: 3;
  --z-ui: 5;
  --z-card: 20;
  --z-finale: 30;
  --z-intro: 40;
}

*{ box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

html, body{ height: 100%; }

body{
  font-family: var(--body);
  color: var(--ink);
  background: var(--sky-1);
  overflow: hidden;
  position: fixed;
  inset: 0;
  width: 100%;
  height: 100%;
  height: 100dvh;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}

#app{ position: relative; width: 100%; height: 100%; }

/* =========================== ESCENARIO / JARDÍN =========================== */
#stage{
  position: absolute;
  inset: 0;
  z-index: var(--z-stage);
  overflow: hidden;
  background:
    radial-gradient(135% 95% at 50% 116%, var(--glow-warm) 0%, transparent 44%),
    radial-gradient(120% 78% at 50% 104%, var(--glow-rosa) 0%, transparent 40%),
    radial-gradient(90% 60% at 78% 8%, oklch(0.55 0.14 330 / 0.5) 0%, transparent 55%),
    linear-gradient(177deg, var(--sky-1) 0%, var(--sky-2) 54%, var(--sky-3) 100%);
}

/* vignette suave para dar profundidad */
#stage::after{
  content: "";
  position: absolute;
  inset: 0;
  pointer-events: none;
  background: radial-gradient(120% 100% at 50% 42%, transparent 58%, oklch(0.12 0.06 320 / 0.55) 100%);
  z-index: 4;
}

.layer{ position: absolute; inset: 0; will-change: transform; }

#twinkles{ z-index: 1; }
#petals{ z-index: 2; }
#vines{ z-index: var(--z-vines); pointer-events: none; }
#flowers{ z-index: var(--z-flowers); }

.twinkle{
  position: absolute;
  width: 2.5px; height: 2.5px;
  border-radius: 50%;
  background: var(--ink);
  opacity: 0;
  animation: twinkle var(--dur, 4s) ease-in-out infinite;
  animation-delay: var(--del, 0s);
  box-shadow: 0 0 6px oklch(0.9 0.08 350 / 0.8);
}
@keyframes twinkle{
  0%, 100%{ opacity: 0; transform: scale(0.6); }
  50%{ opacity: var(--max, 0.9); transform: scale(1); }
}

canvas#petals{ width: 100%; height: 100%; display: block; }

/* =============================== FLORES =============================== */
.flower{
  position: absolute;
  left: var(--x); top: var(--y);
  width: var(--s); height: var(--s);
  transform: translate(-50%, -50%);
  border: 0; padding: 0; background: none;
  cursor: pointer;
  -webkit-appearance: none;
  animation: sway var(--swd, 7s) ease-in-out infinite;
  animation-delay: var(--swdel, 0s);
}
@keyframes sway{
  0%, 100%{ translate: 0 0; }
  50%{ translate: var(--swx, 4px) -6px; }
}

.flower .tap{ position: absolute; inset: -22%; border-radius: 50%; }

.flower .halo{
  position: absolute; inset: -55%;
  border-radius: 50%;
  background: radial-gradient(circle, color-mix(in oklch, var(--c1) 65%, transparent) 0%, transparent 62%);
  opacity: 0.45;
  filter: blur(8px);
  transition: opacity 0.9s var(--e-quart), inset 0.9s var(--e-bloom);
}
.flower.open .halo{ opacity: 0.95; inset: -70%; }

.flower .ring{
  position: absolute; inset: 8%;
  border-radius: 50%;
  border: 1.5px solid color-mix(in oklch, var(--c2) 80%, transparent);
  opacity: 0;
  animation: ping 2.8s var(--e-quart) infinite;
}
@keyframes ping{
  0%{ transform: scale(0.55); opacity: 0.85; }
  70%, 100%{ transform: scale(1.7); opacity: 0; }
}
.flower.open .ring{ animation: none; opacity: 0; }

.flower .bud{
  position: absolute; left: 50%; top: 50%;
  width: 34%; height: 40%;
  transform: translate(-50%, -50%);
  border-radius: 52% 52% 50% 50% / 64% 64% 40% 40%;
  background: radial-gradient(circle at 50% 32%, color-mix(in oklch, var(--c2) 85%, white), var(--c1) 78%);
  box-shadow: 0 0 18px color-mix(in oklch, var(--c1) 70%, transparent), inset 0 -2px 4px oklch(0 0 0 / 0.18);
  transition: opacity 0.5s var(--e-quart), transform 0.6s var(--e-bloom);
}
.flower:not(.open):hover .bud{ transform: translate(-50%, -50%) scale(1.12); }
.flower:not(.open):active .bud{ transform: translate(-50%, -50%) scale(0.92); }
.flower.open .bud{ opacity: 0; transform: translate(-50%, -50%) scale(0.2); }

.petals{ position: absolute; inset: 0; }
.petal{
  position: absolute; left: 50%; bottom: 50%;
  width: 44%; height: 60%;
  transform-origin: 50% 100%;
  transform: translateX(-50%) rotate(var(--a)) scale(0.08);
  border-radius: 50% 50% 47% 47% / 76% 76% 32% 32%;
  background: radial-gradient(125% 105% at 50% 100%, var(--c2) 0%, var(--c1) 72%, color-mix(in oklch, var(--c1) 72%, black) 100%);
  opacity: 0;
  filter: drop-shadow(0 2px 6px oklch(0.15 0.05 330 / 0.35));
  transition: transform 1s var(--e-bloom), opacity 0.55s var(--e-quart);
  transition-delay: calc(var(--i) * 55ms);
}
.flower.open .petal{
  transform: translateX(-50%) rotate(var(--a)) scale(1);
  opacity: 1;
}
.core{
  position: absolute; left: 50%; top: 50%;
  width: 27%; height: 27%;
  transform: translate(-50%, -50%) scale(0);
  border-radius: 50%;
  background: radial-gradient(circle at 42% 36%, white 0%, var(--gold) 52%, color-mix(in oklch, var(--gold) 55%, #b5762a) 100%);
  box-shadow: 0 0 14px var(--gold);
  transition: transform 0.7s var(--e-bloom);
  transition-delay: 0.32s;
}
.flower.open .core{ transform: translate(-50%, -50%) scale(1); }

/* ============================ UI SUPERPUESTA ============================ */
#ui{ position: absolute; inset: 0; z-index: var(--z-ui); pointer-events: none; }

#progress{
  position: absolute;
  top: max(20px, env(safe-area-inset-top));
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 9px;
  padding: 9px 15px;
  border-radius: 100px;
  background: oklch(0.2 0.06 326 / 0.4);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  border: 1px solid oklch(0.85 0.08 350 / 0.16);
  opacity: 0;
  transition: opacity 0.8s var(--e-quart);
}
.pip{
  width: 9px; height: 9px;
  border-radius: 50%;
  background: oklch(0.85 0.06 350 / 0.22);
  transition: background 0.5s var(--e-quart), box-shadow 0.5s var(--e-quart), transform 0.5s var(--e-bloom);
}
.pip.on{
  background: var(--accent);
  box-shadow: 0 0 10px var(--accent);
  transform: scale(1.18);
}

#hint{
  position: absolute;
  bottom: max(34px, calc(env(safe-area-inset-bottom) + 28px));
  left: 50%;
  transform: translateX(-50%);
  width: min(86%, 360px);
  text-align: center;
  font-size: 0.94rem;
  line-height: 1.5;
  color: var(--ink-soft);
  text-shadow: 0 1px 14px oklch(0.15 0.06 320 / 0.7);
  opacity: 0;
  transition: opacity 0.9s var(--e-quart);
  text-wrap: balance;
}
#hint .em{ color: var(--ink); font-weight: 500; }

#mute{
  position: absolute;
  top: max(18px, env(safe-area-inset-top));
  right: max(16px, env(safe-area-inset-right));
  width: 42px; height: 42px;
  display: grid; place-items: center;
  border-radius: 50%;
  border: 1px solid oklch(0.85 0.08 350 / 0.18);
  background: oklch(0.2 0.06 326 / 0.42);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  color: var(--ink-soft);
  font-size: 1.05rem;
  cursor: pointer;
  pointer-events: auto;
  opacity: 0;
  transition: opacity 0.8s var(--e-quart), transform 0.25s var(--e-quart);
}
#mute:active{ transform: scale(0.9); }

.show{ opacity: 1 !important; }

/* ============================== INTRO ============================== */
#intro{
  position: absolute; inset: 0;
  z-index: var(--z-intro);
  display: grid;
  place-items: center;
  padding: 32px;
  text-align: center;
  background:
    radial-gradient(120% 80% at 50% 108%, var(--glow-rosa) 0%, transparent 42%),
    linear-gradient(178deg, var(--sky-1) 0%, var(--sky-2) 58%, var(--sky-3) 100%);
  transition: opacity 1s var(--e-quart);
}
.intro-inner{ max-width: 440px; transform: translateY(0); }
.eyebrow{
  font-family: var(--display);
  font-style: italic;
  font-weight: 400;
  font-size: 1.05rem;
  color: var(--accent);
  letter-spacing: 0.01em;
  opacity: 0;
  animation: rise 1s var(--e-expo) 0.2s forwards;
}
#intro h1{
  font-family: var(--display);
  font-weight: 500;
  font-size: clamp(2.3rem, 9vw, 3.6rem);
  line-height: 1.04;
  letter-spacing: -0.02em;
  margin: 16px 0 0;
  text-wrap: balance;
  text-shadow: 0 2px 28px oklch(0.15 0.07 320 / 0.6);
  opacity: 0;
  animation: rise 1.1s var(--e-expo) 0.38s forwards;
}
#intro p{
  margin: 20px auto 0;
  max-width: 30ch;
  font-size: 1.06rem;
  line-height: 1.6;
  color: var(--ink-soft);
  text-wrap: pretty;
  opacity: 0;
  animation: rise 1.1s var(--e-expo) 0.62s forwards;
}
.hint-vol{
  margin-top: 14px;
  font-size: 0.82rem;
  color: var(--ink-mute);
  opacity: 0;
  animation: rise 1.1s var(--e-expo) 0.82s forwards;
}
@keyframes rise{
  from{ opacity: 0; transform: translateY(16px); }
  to{ opacity: 1; transform: translateY(0); }
}
.btn{
  font-family: var(--body);
  font-weight: 500;
  font-size: 1.02rem;
  color: oklch(0.18 0.04 330);
  background: linear-gradient(180deg, oklch(0.92 0.09 350), oklch(0.84 0.14 350));
  border: 0;
  padding: 15px 34px;
  border-radius: 100px;
  cursor: pointer;
  box-shadow: 0 8px 30px oklch(0.7 0.18 350 / 0.45), inset 0 1px 1px oklch(1 0 0 / 0.5);
  transition: transform 0.3s var(--e-bloom), box-shadow 0.3s var(--e-quart);
  -webkit-appearance: none;
}
.btn:hover{ transform: translateY(-2px) scale(1.02); box-shadow: 0 12px 38px oklch(0.7 0.18 350 / 0.55), inset 0 1px 1px oklch(1 0 0 / 0.5); }
.btn:active{ transform: translateY(0) scale(0.97); }
#startBtn{
  margin-top: 38px;
  opacity: 0;
  animation: rise 1.1s var(--e-expo) 1s forwards, glowpulse 3.4s ease-in-out 2.2s infinite;
}
@keyframes glowpulse{
  0%, 100%{ box-shadow: 0 8px 30px oklch(0.7 0.18 350 / 0.4), inset 0 1px 1px oklch(1 0 0 / 0.5); }
  50%{ box-shadow: 0 10px 40px oklch(0.75 0.2 350 / 0.7), inset 0 1px 1px oklch(1 0 0 / 0.5); }
}
#intro.gone{ opacity: 0; pointer-events: none; }

/* ============================ CARTA / RECUERDO ============================ */
#scrim{
  position: absolute; inset: 0;
  z-index: calc(var(--z-card) - 1);
  background: oklch(0.12 0.05 320 / 0.5);
  backdrop-filter: blur(2px);
  -webkit-backdrop-filter: blur(2px);
  opacity: 0; pointer-events: none;
  transition: opacity 0.5s var(--e-quart);
}
#scrim.show{ opacity: 1; pointer-events: auto; }

#card{
  position: absolute;
  z-index: var(--z-card);
  left: 50%;
  bottom: 0;
  transform: translateX(-50%) translateY(118%);
  opacity: 0;
  pointer-events: none;
  width: min(92%, 420px);
  margin-bottom: max(18px, env(safe-area-inset-bottom));
  padding: 26px 24px 22px;
  border-radius: 26px;
  background: var(--card-bg);
  backdrop-filter: blur(22px) saturate(1.3);
  -webkit-backdrop-filter: blur(22px) saturate(1.3);
  border: 1px solid var(--card-brd);
  box-shadow: 0 -10px 60px oklch(0.1 0.05 320 / 0.55), 0 0 0 1px oklch(1 0 0 / 0.04) inset;
  transition: transform 0.7s var(--e-bloom), opacity 0.45s var(--e-quart);
  text-align: center;
}
#card.up{ transform: translateX(-50%) translateY(0); opacity: 1; pointer-events: auto; }
@media (min-width: 600px){
  #card{ bottom: auto; top: 50%; transform: translate(-50%, -46%) scale(0.96); }
  #card.up{ transform: translate(-50%, -50%) scale(1); }
}

.card-mark{
  font-size: 1.7rem;
  line-height: 1;
  margin-bottom: 12px;
  filter: drop-shadow(0 0 12px var(--accent));
}
#card h2{
  font-family: var(--display);
  font-weight: 500;
  font-size: 1.5rem;
  letter-spacing: -0.015em;
  color: var(--ink);
  text-wrap: balance;
}
#card .body{
  margin-top: 12px;
  font-size: 1.02rem;
  line-height: 1.62;
  color: var(--ink-soft);
  text-wrap: pretty;
}
#card .body .soft{ color: var(--ink-mute); font-style: italic; }
.video-wrap{
  margin: 18px auto 6px;
  width: min(220px, 64%);
  aspect-ratio: 9 / 16;
  border-radius: 16px;
  overflow: hidden;
  background: oklch(0.15 0.04 320);
  border: 1px solid var(--card-brd);
  box-shadow: 0 6px 24px oklch(0.1 0.05 320 / 0.5);
}
.video-wrap iframe{ width: 100%; height: 100%; border: 0; display: block; }
#card .next{
  margin-top: 20px;
  font-family: var(--body);
  font-weight: 500;
  font-size: 0.96rem;
  color: var(--ink);
  background: oklch(0.85 0.1 350 / 0.14);
  border: 1px solid var(--card-brd);
  padding: 11px 26px;
  border-radius: 100px;
  cursor: pointer;
  transition: transform 0.25s var(--e-bloom), background 0.25s var(--e-quart);
}
#card .next:hover{ background: oklch(0.85 0.12 350 / 0.24); transform: translateY(-1px); }
#card .next:active{ transform: scale(0.95); }

/* ============================== FINAL ============================== */
#finale{
  position: absolute; inset: 0;
  z-index: var(--z-finale);
  display: grid;
  place-items: center;
  padding: 40px 28px;
  text-align: center;
  opacity: 0; pointer-events: none;
  background: radial-gradient(110% 80% at 50% 50%, oklch(0.14 0.06 326 / 0.35) 0%, oklch(0.12 0.06 320 / 0.78) 75%);
  backdrop-filter: blur(3px);
  -webkit-backdrop-filter: blur(3px);
  transition: opacity 1.4s var(--e-quart);
  overflow-y: auto;
}
#finale.show{ opacity: 1; pointer-events: auto; }
.finale-inner{ max-width: 460px; }
.fin-lead{
  font-family: var(--display);
  font-style: italic;
  font-weight: 400;
  font-size: 1.15rem;
  color: var(--ink-soft);
  text-wrap: balance;
}
.song{
  margin: 22px auto;
  padding: 24px 22px;
  border-radius: 22px;
  background: oklch(0.22 0.06 330 / 0.5);
  border: 1px solid var(--card-brd);
  box-shadow: 0 0 50px oklch(0.7 0.16 350 / 0.28), inset 0 1px 1px oklch(1 0 0 / 0.06);
}
.song .title{
  font-family: var(--display);
  font-weight: 600;
  font-size: 1.65rem;
  letter-spacing: -0.02em;
  color: var(--ink);
  text-wrap: balance;
}
.song .artist{ margin-top: 5px; font-size: 0.92rem; color: var(--ink-mute); }
#playSong{
  margin-top: 18px;
  display: inline-flex; align-items: center; gap: 9px;
}
#songFrame{
  margin-top: 18px;
  width: 100%;
  aspect-ratio: 16 / 9;
  border-radius: 14px;
  overflow: hidden;
  border: 1px solid var(--card-brd);
  display: none;
  box-shadow: 0 8px 30px oklch(0.1 0.05 320 / 0.5);
}
#songFrame.show{ display: block; }
#songFrame iframe{ width: 100%; height: 100%; border: 0; }

.promise{
  margin: 26px auto 0;
  max-width: 28ch;
  font-family: var(--display);
  font-style: italic;
  font-weight: 400;
  font-size: 1.32rem;
  line-height: 1.5;
  color: var(--ink);
  text-wrap: balance;
  text-shadow: 0 0 24px oklch(0.8 0.16 350 / 0.55), 0 0 50px oklch(0.78 0.16 350 / 0.35);
  opacity: 0;
  transition: opacity 1.6s var(--e-quart), transform 1.6s var(--e-expo);
  transform: translateY(14px);
}
.promise.show{ opacity: 1; transform: translateY(0); }
.door{
  margin-top: 22px;
  font-size: 1.0rem;
  line-height: 1.6;
  color: var(--ink-soft);
  text-wrap: pretty;
  opacity: 0;
  transition: opacity 1.6s var(--e-quart) 0.5s;
}
.door.show{ opacity: 1; }
.sign{
  margin-top: 26px;
  font-family: var(--display);
  font-size: 1.18rem;
  color: var(--ink);
  opacity: 0;
  transition: opacity 1.6s var(--e-quart) 1s;
}
.sign .name{ font-weight: 600; }
.sign.show{ opacity: 1; }
.replay{
  margin-top: 30px;
  font-size: 0.82rem;
  color: var(--ink-mute);
  background: none; border: 0; cursor: pointer;
  text-decoration: underline;
  text-underline-offset: 4px;
  opacity: 0;
  transition: opacity 1.6s var(--e-quart) 1.4s;
}
.replay.show{ opacity: 0.7; }

/* ===================== MINI-JUEGOS (sopa + ukelele) ===================== */
#card{ max-height: min(86vh, 680px); overflow-y: auto; }

.sopa{ margin-top: 18px; }
.sopa-q{ font-family: var(--display); font-style: italic; font-size: 1.18rem; color: var(--ink); margin-bottom: 16px; }
.sopa-row{ position: relative; display: flex; justify-content: center; align-items: center; gap: 16px; min-height: 60px; }
.sopa-no{
  font-family: var(--body); font-weight: 600; font-size: 1.2rem;
  color: oklch(0.18 0.04 330);
  background: linear-gradient(180deg, oklch(0.92 0.09 350), oklch(0.84 0.14 350));
  border: 0; padding: 13px 36px; border-radius: 100px; cursor: pointer;
  box-shadow: 0 8px 26px oklch(0.7 0.18 350 / 0.42);
  transition: transform 0.2s var(--e-bloom);
}
.sopa-no:hover{ transform: scale(1.06); }
.sopa-no:active{ transform: scale(0.94); }
.sopa-si{
  font-family: var(--body); font-size: 0.82rem; color: var(--ink-mute);
  background: oklch(0.85 0.06 350 / 0.12); border: 1px solid var(--card-brd);
  padding: 6px 15px; border-radius: 100px; cursor: pointer;
  transition: transform 0.16s var(--e-quart);
}
.sopa-win{ font-family: var(--display); font-size: 1.22rem; color: var(--ink); line-height: 1.45; }
.sopa-win span{ font-size: 0.96rem; color: var(--ink-soft); font-style: italic; }

.uke{ margin-top: 16px; }
.uke-board{ display: flex; justify-content: center; gap: 18px; padding: 12px 6px 4px; touch-action: none; }
.uke-str{ position: relative; width: 28px; height: 116px; background: none; border: 0; cursor: pointer; display: grid; place-items: center; }
.uke-str span{
  display: block; width: 2px; height: 100%; border-radius: 2px;
  background: linear-gradient(180deg, var(--accent), var(--gold));
  box-shadow: 0 0 8px var(--accent);
}
.uke-str.vib span{ animation: ukevib 0.5s var(--e-quart); }
@keyframes ukevib{ 0%{ transform: scaleX(2.4); filter: brightness(1.6); } 100%{ transform: scaleX(1); filter: brightness(1); } }
.uke-hint{ margin-top: 6px; font-size: 0.85rem; color: var(--ink-mute); }

/* ===================== ACCESIBILIDAD / MENOS MOVIMIENTO ===================== */
@media (prefers-reduced-motion: reduce){
  .flower, .twinkle{ animation: none !important; }
  *{ transition-duration: 0.25s !important; }
  .petal{ transition-delay: 0s !important; }
  #startBtn{ animation: rise 0.5s ease forwards !important; }

(function twinkles(){

})();

/* =========================== FLORES =========================== */

/* =========================== AUDIO (Web Audio + stems) =========================== */
let actx = null, master = null, muted = false, audioOK = false;
const STEM_ORDER = ["other", "bass", "drums", "vocals"];     // orden en que entran las pistas
const STEM_GAIN = { other: 0.9, bass: 0.85, drums: 0.8, vocals: 1.0 };
const STEM_STOP = { other: 0.0, bass: 0.34, drums: 0.62, vocals: 0.99 }; // umbral de progreso 0..1
let stems = {};        // name -> { gain }
let songFull = null;   // fallback sin stems: { gain, filter }
let usingStems = false, songLoaded = false;
const PLUCK = [392.0, 440.0, 523.25, 587.33, 659.25, 783.99, 880.0];
const UKE = { G: 392.0, C: 261.63, E: 329.63, A: 440.0 };    // ukelele jugable (gCEA)

function initAudio(){
  if (audioOK) return;
  try{
    const AC = window.AudioContext || window.webkitAudioContext;
    actx = new AC();
    master = actx.createGain();
    master.gain.value = 0.9;
    master.connect(actx.destination);
    // brillo (delay) para los plucks y el ukelele
    const delay = actx.createDelay(); delay.delayTime.value = 0.3;
    const fb = actx.createGain(); fb.gain.value = 0.25;
    const wet = actx.createGain(); wet.gain.value = 0.32;
    delay.connect(fb); fb.connect(delay); delay.connect(wet); wet.connect(master);
    master._delay = delay;
    audioOK = true;
    loadSong();
  }catch(e){ audioOK = false; }
}

async function fetchBuffer(url){
  const res = await fetch(encodeURI(url));
  if (!res.ok) throw new Error("no " + url);
  return await actx.decodeAudioData(await res.arrayBuffer());
}

async function loadSong(){
  // 1) intentar las pistas separadas (stems)
  try{
    const bufs = {};
    await Promise.all(STEM_ORDER.map(async (n) => { bufs[n] = await fetchBuffer(CONFIG.finale.stems[n]); }));
    const at = actx.currentTime + 0.2;
    STEM_ORDER.forEach((n) => {
      const src = actx.createBufferSource(); src.buffer = bufs[n]; src.loop = true;
      const g = actx.createGain(); g.gain.value = 0.0001;
      src.connect(g); g.connect(master); src.start(at);
      stems[n] = { gain: g };
    });
    usingStems = true; songLoaded = true;
    setSongProgress(currentProgress());
    return;
  }catch(e){ /* sin stems: probamos con la canción entera */ }
  // 2) fallback: canción completa con un filtro que se va abriendo
  try{
    const buf = await fetchBuffer(CONFIG.finale.songFile);
    const src = actx.createBufferSource(); src.buffer = buf; src.loop = true;
    const filter = actx.createBiquadFilter(); filter.type = "lowpass"; filter.frequency.value = 360; filter.Q.value = 0.5;
    const g = actx.createGain(); g.gain.value = 0.0001;
    src.connect(filter); filter.connect(g); g.connect(master); src.start(actx.currentTime + 0.2);
    songFull = { gain: g, filter };
    songLoaded = true;
    setSongProgress(currentProgress());
  }catch(e){ /* sin audio: quedan sólo los plucks */ }
}

function currentProgress(){ return Math.min(1, bloomedOrder.length / TOTAL); }

function setSongProgress(level){
  if (!actx || !songLoaded) return;
  const t = actx.currentTime;
  if (usingStems){
    STEM_ORDER.forEach((n) => {
      const s = stems[n]; if (!s) return;
      const on = level >= STEM_STOP[n];
      s.gain.gain.cancelScheduledValues(t);
      s.gain.gain.linearRampToValueAtTime(on ? STEM_GAIN[n] : 0.0001, t + 1.2);
    });
  } else if (songFull){
    songFull.gain.gain.cancelScheduledValues(t);
    songFull.gain.gain.linearRampToValueAtTime(0.16 + 0.74 * level, t + 1.2);
    songFull.filter.frequency.cancelScheduledValues(t);
    songFull.filter.frequency.linearRampToValueAtTime(360 + level * level * 9000, t + 1.2);
  }
}

function note(freq, t0, dur, peak, type){
  if (!actx || muted) return;
  const o = actx.createOscillator();
  o.type = type || "triangle";
  o.frequency.value = freq;
  const g = actx.createGain();
  const t = actx.currentTime + t0;
  g.gain.setValueAtTime(0.0001, t);
  g.gain.exponentialRampToValueAtTime(peak || 0.5, t + 0.012);
  g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
  o.connect(g);
  g.connect(master);
  if (master._delay) g.connect(master._delay);
  o.start(t);
  o.stop(t + dur + 0.06);
}

function playPluck(i){
  const f = PLUCK[Math.min(i, PLUCK.length - 1)];
  note(f, 0, 1.6, 0.42, "triangle");
  note(f * 2, 0, 0.7, 0.1, "sine");
}

function playUke(freq){
  note(freq, 0, 1.9, 0.5, "triangle");
  note(freq * 2, 0, 0.8, 0.14, "sine");
  note(freq * 3, 0, 0.4, 0.05, "sine");
}

function duck(on){
  if (!master || !actx) return;
  master.gain.linearRampToValueAtTime(on ? 0.14 : (muted ? 0.0001 : 0.9), actx.currentTime + 0.3);
}

/* mute */
$("#mute").addEventListener("click", () => {
  muted = !muted;
  $("#mute").textContent = muted ? "🔇" : "🔊";
  if (master && actx) master.gain.linearRampToValueAtTime(muted ? 0.0001 : 0.9, actx.currentTime + 0.2);
});

/* =========================== PÉTALOS (canvas) =========================== */
(function petalCanvas(){
  const cv = $("#petals");
  const ctx = cv.getContext("2d");
  let W, H, dpr, parts = [];
  const COUNT = REDUCE ? 0 : 28;

  function resize(){
    dpr = Math.min(window.devicePixelRatio || 1, 2);
    W = cv.clientWidth; H = cv.clientHeight;
    cv.width = W * dpr; cv.height = H * dpr;
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  const COLORS = ["#ff8fbf", "#ffb3cf", "#ffc9a8", "#e9a8ff", "#ff9ec2"];
  function mk(initial){
    return {
      x: Math.random() * W,
      y: initial ? Math.random() * H : -20,
      r: 5 + Math.random() * 7,
      sp: 0.25 + Math.random() * 0.55,
      sway: 0.4 + Math.random() * 0.9,
      ph: Math.random() * Math.PI * 2,
      rot: Math.random() * Math.PI,
      vr: (Math.random() - 0.5) * 0.02,
      col: COLORS[(Math.random() * COLORS.length) | 0],
      al: 0.25 + Math.random() * 0.4,
    };
  }
  function petal(p){
    ctx.save();
    ctx.translate(p.x, p.y);
    ctx.rotate(p.rot);
    ctx.globalAlpha = p.al;
    ctx.fillStyle = p.col;
    ctx.beginPath();
    ctx.moveTo(0, -p.r);
    ctx.quadraticCurveTo(p.r * 0.85, -p.r * 0.25, 0, p.r);
    ctx.quadraticCurveTo(-p.r * 0.85, -p.r * 0.25, 0, -p.r);
    ctx.fill();
    ctx.restore();
  }
  let t = 0;
  function loop(){
    if (REDUCE) return;
    ctx.clearRect(0, 0, W, H);
    t += 0.016;
    for (const p of parts){
      p.y += p.sp;
      p.x += Math.sin(t * p.sway + p.ph) * 0.5;
      p.rot += p.vr;
      if (p.y > H + 24){ Object.assign(p, mk(false)); }
      petal(p);
    }
    requestAnimationFrame(loop);
  }
  resize();
  window.addEventListener("resize", resize);
  if (COUNT){
    parts = Array.from({ length: COUNT }, () => mk(true));
    requestAnimationFrame(loop);
  }
})();

/* =========================== PARALLAX =========================== */
(function parallax(){
  if (REDUCE) return;
  const layers = [
    { el: $("#twinkles"), d: 6 },
    { el: $("#petals"), d: 10 },
    { el: $("#flowers"), d: 16 },
  ];
  let tx = 0, ty = 0, cx = 0, cy = 0;
  function apply(){
    cx += (tx - cx) * 0.06;
    cy += (ty - cy) * 0.06;
    for (const l of layers){
      l.el.style.transform = `translate3d(${cx * l.d}px, ${cy * l.d}px, 0)`;
    }
    requestAnimationFrame(apply);
  }
  window.addEventListener("pointermove", (e) => {
    tx = (e.clientX / window.innerWidth - 0.5) * 2;
    ty = (e.clientY / window.innerHeight - 0.5) * 2;
  });
  window.addEventListener("deviceorientation", (e) => {
    if (e.gamma == null) return;
    tx = Math.max(-1, Math.min(1, e.gamma / 30));
    ty = Math.max(-1, Math.min(1, (e.beta - 45) / 30));
  });
  apply();
})();

/* =========================== INTERACCIÓN =========================== */
const card = $("#card"), scrim = $("#scrim");
let cardOpen = false, activeVideo = false;

function openFlower(btn, data, idx){
  if (!btn.classList.contains("open")){
    btn.classList.add("open");
    const order = bloomedOrder.length;
    bloomedOrder.push({ x: data.x, y: data.y });
    playPluck(order);
    setSongProgress(bloomedOrder.length / TOTAL);
    if (navigator.vibrate) try{ navigator.vibrate(12); }catch(e){}
    drawVine();
    $$(".pip")[idx] && $$(".pip")[idx].classList.add("on");
    $("#hint").classList.remove("show");
  }
  showCard(data);
}

const $$ = (s) => Array.from(document.querySelectorAll(s));

function showCard(data){
  $("#cardTitle").textContent = data.title;
  let html = data.body;
  $("#cardBody").innerHTML = html;
  if (data.video){
    const vw = document.createElement("div");

    $("#cardBody").appendChild(vw);
    activeVideo = true;
    duck(true);
  }
  if (data.game === "sopa") buildSopa($("#cardBody"));
  if (data.game === "ukelele") buildUke($("#cardBody"));
  cardOpen = true;
  scrim.classList.add("show");
  requestAnimationFrame(() => card.classList.add("up"));
}

function hideCard(){
  card.classList.remove("up");
  scrim.classList.remove("show");
  cardOpen = false;
  if (activeVideo){ duck(false); activeVideo = false; }
  setTimeout(() => {
    card.querySelectorAll(".video-wrap, .sopa, .uke").forEach((el) => el.remove());
    if (bloomedOrder.length === TOTAL) goFinale();
  }, 650);
}

$("#cardNext").addEventListener("click", hideCard);
scrim.addEventListener("click", hideCard);

/* ----- mini-juego: la sopa (el "sí" se escapa) ----- */
function buildSopa(parent){
  const w = document.createElement("div");
  w.className = "sopa";
  w.innerHTML =
    '<p class="sopa-q">¿comemos sopa?</p>' +
    '<div class="sopa-row"><button type="button" class="sopa-no">NO</button>' +
    '<button type="button" class="sopa-si">sí</button></div>';
  parent.appendChild(w);
  const si = w.querySelector(".sopa-si");
  const no = w.querySelector(".sopa-no");
  const dodge = (e) => {
    if (e) e.preventDefault();
    const dx = (Math.random() * 2 - 1) * 130;
    const dy = (Math.random() * 2 - 1) * 54;
    si.style.transform = `translate(${dx.toFixed(0)}px, ${dy.toFixed(0)}px) rotate(${(Math.random() * 30 - 15) | 0}deg)`;
  };
  ["pointerenter", "pointerdown", "touchstart", "mouseover"].forEach((ev) =>
    si.addEventListener(ev, dodge, { passive: false }));
  si.addEventListener("click", dodge);
  no.addEventListener("click", () => {
    w.innerHTML = '<p class="sopa-win">respuesta correcta ✅<br><span>la relación sigue en pie.</span></p>';
    if (navigator.vibrate) try{ navigator.vibrate(18); }catch(_){}
    note(659.25, 0, 0.5, 0.4, "triangle");
    note(880.0, 0.09, 0.6, 0.38, "triangle");
  });
}

/* ----- mini-juego: ukelele jugable ----- */
function buildUke(parent){
  const w = document.createElement("div");
  w.className = "uke";
  const strings = [["G", UKE.G], ["C", UKE.C], ["E", UKE.E], ["A", UKE.A]];
  w.innerHTML = '<div class="uke-board">' +
    strings.map(([n, f]) => `<button type="button" class="uke-str" data-f="${f}" aria-label="cuerda ${n}"><span></span></button>`).join("") +
    '</div><p class="uke-hint">tocá las cuerdas (o pasá el dedo) 🎶</p>';
  parent.appendChild(w);
  const pluck = (el) => {
    if (!el) return;
    playUke(parseFloat(el.dataset.f));
    el.classList.remove("vib"); void el.offsetWidth; el.classList.add("vib");
    if (navigator.vibrate) try{ navigator.vibrate(7); }catch(_){}
  };
  w.querySelectorAll(".uke-str").forEach((el) =>
    el.addEventListener("pointerdown", (e) => { e.preventDefault(); pluck(el); }, { passive: false }));
  let last = null;
  w.querySelector(".uke-board").addEventListener("pointermove", (e) => {
    const t = document.elementFromPoint(e.clientX, e.clientY);
    const hit = t && t.closest ? t.closest(".uke-str") : null;
    if (hit && hit !== last){ last = hit; pluck(hit); }
  });
}

/* enredadera que une las flores */
const vines = $("#vines");
function drawVine(){
  if (bloomedOrder.length < 2) return;
  const a = bloomedOrder[bloomedOrder.length - 2];
  const b = bloomedOrder[bloomedOrder.length - 1];
  const mx = (a.x + b.x) / 2 + (Math.random() * 10 - 5);
  const my = (a.y + b.y) / 2 + (Math.random() * 8 - 4);
  const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
  path.setAttribute("d", `M ${a.x} ${a.y} Q ${mx} ${my} ${b.x} ${b.y}`);
  path.setAttribute("fill", "none");
  path.setAttribute("stroke", "url(#vineGrad)");
  path.setAttribute("stroke-width", "1.1");
  path.setAttribute("stroke-linecap", "round");
  path.setAttribute("vector-effect", "non-scaling-stroke");
  path.style.filter = "drop-shadow(0 0 3px rgba(255,150,200,0.7))";
  if (!REDUCE){
    const len = Math.hypot(b.x - a.x, b.y - a.y) * 1.6;
    path.style.strokeDasharray = len;
    path.style.strokeDashoffset = len;
    path.style.transition = "stroke-dashoffset 1.1s cubic-bezier(0.16,1,0.3,1)";
    requestAnimationFrame(() => { path.style.strokeDashoffset = "0"; });
  }
  vines.appendChild(path);
}
// gradiente de la enredadera
vines.insertAdjacentHTML("afterbegin",
  `<defs><linearGradient id="vineGrad" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0" stop-color="#ff9ec2" stop-opacity="0.35"/>
    <stop offset="1" stop-color="#ffd0a8" stop-opacity="0.7"/>
  </linearGradient></defs>`);

/* =========================== ARRANQUE =========================== */
function start(){
  initAudio();
  if (actx && actx.state === "suspended") actx.resume();

  // iOS: permiso de orientación (gesto del usuario)
  if (window.DeviceOrientationEvent && typeof DeviceOrientationEvent.requestPermission === "function"){
    DeviceOrientationEvent.requestPermission().catch(() => {});
  }

  $("#intro").classList.add("gone");
  setTimeout(() => { $("#intro").style.display = "none"; }, 1000);
  $("#progress").classList.add("show");
  $("#mute").classList.add("show");
  setTimeout(() => $("#hint").classList.add("show"), 700);
}
$("#startBtn").addEventListener("click", start);

/* =========================== FINAL =========================== */
function goFinale(){
  $("#hint").classList.remove("show");
  $("#progress").classList.remove("show");
  setSongProgress(1); // entra la voz: la canción suena entera
  const fin = $("#finale");
  fin.classList.add("show");
  setTimeout(() => $("#promise").classList.add("show"), 1800);
  setTimeout(() => $("#door").classList.add("show"), 2800);
  setTimeout(() => $("#sign").classList.add("show"), 3600);
  setTimeout(() => $("#replay").classList.add("show"), 4200);
}

$("#playSong").addEventListener("click", () => {
  if (actx && actx.state === "suspended") actx.resume();
  if (muted){ muted = false; $("#mute").textContent = "🔊"; }
  if (master && actx) master.gain.linearRampToValueAtTime(0.9, actx.currentTime + 0.2);
  setSongProgress(1);
});

$("#replay").addEventListener("click", () => location.reload());
</script>
